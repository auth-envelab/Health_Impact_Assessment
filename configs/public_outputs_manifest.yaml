public_candidate:
  include:
    - "Run-Manuscript-Reproducibility.ps1"
    - "scripts/run_manuscript_reproducibility_from_harmonized.py"
    - "scripts/generate_manuscript_tables.py"
    - "scripts/generate_manuscript_figures.py"
    - "scripts/validate_manuscript_outputs.py"
    - "scripts/build_public_release_candidate.py"
    - "scripts/reproduce_from_public_aggregate_outputs.py"
    - "scripts/validate_public_release_candidate.py"
    - "scripts/create_manuscript_item_manifest.py"
    - "configs/*.example.yaml"
    - "configs/expected_results_manifest.yaml"
    - "configs/public_outputs_manifest.yaml"
    - "docs/*.md"
    - "results/**/*.csv"
    - "results/**/*.xlsx"
    - "figures/**/*.png"
    - "tables/**/*.xlsx"
    - "tables/**/*.csv"
    - "checksums/manifest_sha256.txt"
  exclude:
    - "*.zip"
    - "*.rds"
    - "*.feather"
    - "*.parquet"
    - "*.docx"
    - "analysis_outputs"
    - "legacy/**"
    - "R/**"
    - "results/**/Supplementary Table S7*"
    - "tables/**/Supplementary Table S7*"
    - "scripts/[0-9][0-9]_*.py"
